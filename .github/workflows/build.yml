name: Build and Zip Mod

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Download Godot 4.5.1 mono
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_linux_x86_64.zip" -O godot.zip
          unzip -q godot.zip -d godot_dir
          GODOT_BIN=$(find godot_dir -type f -name "*.x86_64" | head -1)
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$(realpath "$GODOT_BIN")" >> $GITHUB_ENV

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Publish mod
        run: |
          mkdir -p /tmp/mods/EndlessMod
          dotnet publish -c Release \
            /p:ModsPath=/tmp/mods/ \
            /p:GodotPath="$GODOT_BIN"

      - name: Create zip archive
        run: |
          mkdir -p dist
          cp -r /tmp/mods/EndlessMod dist/
          cd dist
          zip -r EndlessMod.zip EndlessMod/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EndlessMod
          path: dist/EndlessMod.zip

      - name: Get mod version
        id: version
        run: |
          TAG=$(jq -re '.version' EndlessMod.json)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EndlessMod ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: dist/EndlessMod.zip
